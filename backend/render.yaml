services:
  - type: web
    name: stock-research-lite-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: SEC_USER_AGENT
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
